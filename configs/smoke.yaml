# Tiny sweep for the macOS smoke test against the mock server. No GPU needed.
platform: mock
base_url: http://127.0.0.1:8000
model: llama3.1-8b
results_dir: results

sweep:
  mode: closed
  concurrencies: [1, 8, 32]
  prompt_lens: [128]
  output_lens: [32]
  num_requests: 20
  warmup_requests: 3
  cooldown_s: 0.3
  request_timeout_s: 30

telemetry:
  enabled: true
  backend: synthetic        # macOS has no NVIDIA GPU
  interval_ms: 50
  scrape_vllm_metrics: true

report:
  make_plots: true

slo:
  ttft_ms: 500
  tpot_ms: 50
